server:
  port: 8081  # Puerto diferente para no conflictos

spring:
  application:
    name: colas-demo
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # Configuración específica para RabbitMQ
    listener:
      simple:
        acknowledge-mode: manual  # Confirmación manual de mensajes
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

logging:
  level:
    com.example.colas: DEBUG
    org.springframework.amqp: DEBUG
